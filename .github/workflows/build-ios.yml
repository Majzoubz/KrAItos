name: ios-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env file from secrets
        run: |
          echo "EXPO_PUBLIC_GROQ_KEY=${{ secrets.EXPO_PUBLIC_GROQ_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}" >> .env

      - name: Generate native iOS folder
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: pod install --repo-update
        working-directory: ios

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build iOS app (no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/KrAItos.xcworkspace \
            -scheme KrAItos \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color

      - name: Create Payload folder
        run: mkdir -p Payload

      - name: Find built .app
        run: find ios/build/Build/Products -name "*.app" -maxdepth 3

      - name: Copy .app to Payload
        run: |
          APP=$(find ios/build/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then echo "❌ No .app found — xcodebuild likely failed"; exit 1; fi
          cp -R "$APP" Payload/

      - name: Package IPA
        run: ditto -c -k --sequesterRsrc --keepParent Payload KrAItos.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: KrAItos.ipa